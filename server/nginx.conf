server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex off;

    # CORS so the Flutter web build (if ever used) can read the manifest.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-cache" always;

    types {
        application/json json;
        audio/mpeg       mp3;
        text/plain       lrc;
        image/jpeg       jpg jpeg;
        image/png        png;
        image/webp       webp;
    }

    # Manifest must never be cached so re-syncs see fresh data.
    location = /manifest.json {
        add_header Cache-Control "no-store" always;
        try_files /manifest.json =404;
    }

    location /songs/   { try_files $uri =404; }
    location /lyrics/  { try_files $uri =404; }
    location /artwork/ { try_files $uri =404; }
    location /artists/ { try_files $uri =404; }

    location / { return 404; }
}
