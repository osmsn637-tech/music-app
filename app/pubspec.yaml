name: music_app
description: "Personal offline-first Flutter music player"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Audio playback
  # flutter_soloud replaces just_audio so we can read live FFT directly
  # off the audio mix (drives the bass-reactive fluid background) and
  # mix multiple sources for the AI-DJ crossfade without juggling two
  # AudioPlayer instances.
  # Pinned to 3.4.x: audio_flux needs >=3.4.10, and 4.0 made play() sync
  # (breaking). No 3.1→3.4 API changes touch PlayerService.
  flutter_soloud: ^3.4.10
  # GPU audio-reactive visualizer (waveform / FFT / shader) by the
  # flutter_soloud author — reads the same SoLoud.instance mix the player
  # drives, so it visualises live playback with no extra capture layer.
  audio_flux: ^1.2.2
  # audio_service still owns the lockscreen / Bluetooth / media-button
  # bridge. The handler proxies its callbacks to our PlayerService
  # (which now wraps SoLoud).
  audio_service: ^0.18.13
  # iOS audio category + interruption handling. Required now that
  # just_audio_background is no longer doing it implicitly.
  audio_session: ^0.1.21
  rxdart: ^0.27.7

  # Storage / paths
  path_provider: ^2.1.5
  path: ^1.9.0

  # Networking
  dio: ^5.7.0
  # Live Connect — real-time cross-device playback handoff (WebSocket client).
  web_socket_channel: ^3.0.1
  # Stable per-install device id for Live Connect pairing.
  uuid: ^4.5.1

  # Desktop window control — drives the macOS floating mini-player
  # (resize / always-on-top / hide title bar / drag-to-move).
  window_manager: ^0.4.3

  # Local database (Phase 2 — pulled in now so build_runner is wired)
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Permissions (mainly for Android storage on older API levels)
  permission_handler: ^11.3.1

  # Settings persistence (used Phase 3)
  shared_preferences: ^2.3.2

  # OS share sheet for "share lyrics as image".
  share_plus: ^10.0.0
  # Save lyric card to the device's Photos / Gallery.
  gal: ^2.3.0

  # Native file + folder picker for "Import from device" in Settings.
  file_picker: ^8.1.4

  # Material container-transform for the player's Lyrics button →
  # full lyrics page morph (and reverse on back).
  animations: ^2.0.11

  # iOS-26 "Liquid Glass" surfaces (real refraction + specular) used for
  # the mini/full player chrome. Cross-platform (Impeller on mobile,
  # lightweight shader fallback on Windows/web).
  liquid_glass_widgets: ^0.16.1

  # System volume read/write for the iOS-26-style player volume slider.
  volume_controller: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

  # App launcher icons (Android / iOS / Windows)
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Bundled DJ voice bank. Pre-rendered Opus clips of the fine-tuned
  # F5-TTS voice + manifest.json. Loaded once on first launch into the
  # app's documents dir, then read from disk. ~3 MB at 32 kbps Opus.
  # See docs/dj-voice-bank-script.md for the line content.
  assets:
    - assets/dj_voice_bank/
    - assets/quick_pick_bg/
    - assets/icon/flacko_logo.png
    # AutoMix analysis sidecars (*.automix.json) — bundled so the engine has
    # beat/key/cue data on every platform; copied into app-support on first
    # launch (see automix/runtime/sidecar_seeder.dart).
    - assets/automix_analysis/
    # Dev-seed sample audio / cover art / lyrics (debug-only). Empty by
    # default; drop files matching the slugs in
    # assets/sample_songs/README.txt and the bug-icon seed will pick
    # them up.
    - assets/sample_songs/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
